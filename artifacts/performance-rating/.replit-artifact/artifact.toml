kind = "web"
previewPath = "/"
title = "Employee Performance Rating"
version = "1.0.0"
id = "artifacts/performance-rating"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21001

[services.development]
run = "pnpm --filter @workspace/performance-rating run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/performance-rating", "run", "build" ]
publicDir = "artifacts/performance-rating/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21001"
BASE_PATH = "/"
